name: Release Windows

# Declenche la construction + publication de l'installeur quand on pousse un tag
# de version (ex: v0.1.1). Workflow_dispatch permet aussi un lancement manuel.
#
# Process de release cote dev :
#   npm version patch          # bump package.json, commit + tag vX.Y.Z
#   git push --follow-tags     # -> ce workflow build et publie la Release
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # necessaire pour creer la Release GitHub

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verifier que le tag correspond a la version de package.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME.TrimStart('v')
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            Write-Error "Le tag ($tag) ne correspond pas a package.json ($pkg). Utilise 'npm version'."
            exit 1
          }
          Write-Host "Version: $pkg"

      - name: Dependances Python (+ PyInstaller)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Dependances Node (racine + web)
        shell: pwsh
        run: |
          npm ci
          npm --prefix web ci

      - name: Construire les ressources (backend.exe + Chromium + web standalone)
        shell: pwsh
        run: npm run build:resources

      - name: Construire et publier l'installeur (GitHub Release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
